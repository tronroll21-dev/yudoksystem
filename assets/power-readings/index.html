<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>検針入力</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="/assets/power-readings/index.js"></script>
    <style>
        input::-webkit-outer-spin-button,
input::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
}
    </style>
</head>
<body class="bg-gray-100 p-4">
    <div x-data="powerReadings" class="max-w-[1400px] mx-auto bg-white p-6 rounded shadow">
        <div class="flex items-center justify-center mb-4 gap-4">
            <button @click="prevMonth()" class="text-2xl font-bold hover:text-blue-500 cursor-pointer">&lt;</button>
            <h1 class="text-2xl font-bold" x-text="title"></h1>
            <button @click="nextMonth()" class="text-2xl font-bold hover:text-blue-500 cursor-pointer">&gt;</button>
        </div>
        
        <div x-show="isLoading" class="text-center py-4">
            読み込み中...
        </div>

        <div x-show="!isLoading" class="overflow-hidden border border-gray-300 rounded">
            <!-- Table Header (10 columns now) -->
            <div class="grid grid-cols-10 bg-gray-200 font-bold text-center border-b border-gray-300 text-sm">
                <div class="row-span-2 flex items-center justify-center border-r border-gray-300 px-2">月日</div>
                <div class="row-span-2 flex items-center justify-center border-r border-gray-300 px-2">曜日</div>
                
                <div class="col-span-4 border-b border-r border-gray-300 py-1">電気メーター検針(kwh)</div>
                
                <div class="row-span-2 flex items-center justify-center border-r border-gray-300 px-2">年度累計</div>
                <div class="row-span-2 flex items-center justify-center border-r border-gray-300 px-2">料金</div>
                <div class="row-span-2 flex items-center justify-center border-r border-gray-300 px-2">備考</div>
                <div class="row-span-2 flex items-center justify-center px-2">記入者</div>
                
                <!-- Col 3-6 Row 2 -->
                <div class="border-r border-gray-300 py-1">検針値</div>
                <div class="border-r border-gray-300 py-1">使用量</div>
                <div class="border-r border-gray-300 py-1">600倍</div>
                <div class="border-r border-gray-300 py-1">当月累計</div>
            </div>
            
            <!-- Baseline Row -->
            <div class="grid grid-cols-10 bg-gray-100 text-gray-500 text-center border-b border-gray-300 text-sm">
            <div class="flex items-center justify-center border-r border-gray-300 px-2">前月末</div>
            <div class="flex items-center justify-center border-r border-gray-300 px-2">&nbsp;</div>
            
            <div class="flex items-center justify-center border-r border-gray-300 px-2" x-text="baseline.power_reading"></div>
            <div class="flex items-center justify-center border-r border-gray-300 px-2 col-span-3">&nbsp;</div>
            <div class="flex items-center justify-center border-r border-gray-300 px-2">年度累計</div>
            <div class="flex items-center justify-center px-2 col-span-3">&nbsp;</div>
            </div>

            <!-- Table Rows -->
            <template x-for="(row, index) in readings" :key="index">
                <div class="grid grid-cols-10 text-center border-b border-gray-200 last:border-0 text-sm h-6"   
                     :class="getJapaneseWeekday(row.date) === '日' ? 'bg-red-50' : (getJapaneseWeekday(row.date) === '土' ? 'bg-blue-50' : '')">
                    <!-- Date -->
                    <div class="px-2 border-r border-gray-200 h-6" x-text="getFormattedDate(row)"></div>
                    
                    <!-- Weekday -->
                    <div class="px-2 border-r border-gray-200 h-6" x-text="getJapaneseWeekday(row.date)"></div>
                    
                    <!-- Power Reading (Editable) -->
                    <div class="border-r border-gray-200 h-6">
                        <input type="number" step="0.1" 
                               class="bg-[#FFE499] border-0 focus:outline-none focus:ring-0 px-1 text-center w-full h-6"
                               x-model="readings[index].power_reading"
                               @input="updateAuthor(index)"
                               placeholder="-"
                               @blur="saverow({year: row.year, month: row.month, day: row.day, power_reading: readings[index].power_reading, memo: readings[index].memo})">
                    </div>
                    
                    <!-- Difference (Column 4) -->
                    <div class="px-2 border-r border-gray-200 h-6" x-text="getDiff(index).toFixed(2)"></div>
                    
                    <!-- Value (Column 5) -->
                    <div class="px-2 border-r border-gray-200 h-6" x-text="getValue(index).toLocaleString()"></div>
                    
                    <!-- Running Total (Column 6) -->
                    <div class="px-2 border-r border-gray-200 h-6" x-text="getRunningTotal(index).toLocaleString()"></div>

                    <!-- Annual Total (Column 7) -->
                    <div class="px-2 border-r border-gray-200 h-6" x-text="Math.floor(getAnnualTotal(index)).toLocaleString()"></div>

                    <!-- Fee (Column 8) -->
                    <div class="px-2 border-r border-gray-200 h-6" x-text="getFee(index).toLocaleString()"></div>

                    <!-- Memo (Column 9) -->
                    <div class="border-r border-gray-200 h-6">
                        <input type="text" 
                               class="bg-[#FFE499] border-0 focus:outline-none focus:ring-0 px-1 text-center w-full h-6"
                               x-model="readings[index].memo"                            
                               @blur="saverow({year: row.year, month: row.month, day: row.day, power_reading: readings[index].power_reading, memo: readings[index].memo})">
                               >
                    </div>

                    <!-- Author (Column 10) -->
                    <div class="px-2 border-r border-gray-200 h-6" x-text="row.author"></div>
                </div>
            </template>

            <!-- Summary Rows (spanning 10 columns now) -->
            <!-- 1. 税抜計 -->
            <div class="grid grid-cols-10 text-center border-b border-gray-200 text-sm bg-gray-50">
                <div class="col-span-2 px-2 border-r border-gray-200"></div>
                <div class="col-span-4 px-2 border-r border-gray-200"></div>
                <div class="px-2 border-r border-gray-200 font-bold col-span-2">税抜計</div>
                <div class="px-2 col-span-2" x-text="getSumOfFees().toLocaleString()"></div>
            </div>
            <!-- 2. 消費税 -->
            <div class="grid grid-cols-10 text-center border-b border-gray-200 text-sm bg-gray-50">
                <div class="col-span-2 px-2 border-r border-gray-200"></div>
                <div class="col-span-4 px-2 border-r border-gray-200"></div>
                <div class="px-2 border-r border-gray-200 font-bold col-span-2">消費税</div>
                <div class="px-2 col-span-2" x-text="getCalculatedTax().toLocaleString()"></div>
            </div>
            <!-- 3. 税込合計 -->
            <div class="grid grid-cols-10 text-center border-b border-gray-200 text-sm bg-gray-50">
                <div class="col-span-2 px-2 border-r border-gray-200"></div>
                <div class="col-span-4 px-2 border-r border-gray-200"></div>
                <div class="px-2 border-r border-gray-200 font-bold col-span-2">税込合計</div>
                <div class="px-2 col-span-2" x-text="getCalculatedTotalWithTax().toLocaleString()"></div>
            </div>
            <!-- 4. 税込合計 (Input) -->
            <div class="grid grid-cols-10 text-center border-b border-gray-200 text-sm">
                <div class="col-span-2 px-2 border-r border-gray-200"></div>
                <div class="col-span-4 px-2 border-r border-gray-200"></div>
                <div class="px-2 border-r border-gray-200 font-bold bg-gray-50 col-span-2">税込合計</div>
                <div class="px-1 col-span-2">
                    <input type="number" class="w-full text-center p-1 border-0 focus:outline-none h-full" x-model.number="manualTotalWithTax">
                </div>
            </div>
            <!-- 5. 消費税 (Input) -->
            <div class="grid grid-cols-10 text-center border-b border-gray-200 text-sm">
                <div class="col-span-2 px-2 border-r border-gray-200"></div>
                <div class="col-span-4 px-2 border-r border-gray-200"></div>
                <div class="px-2 border-r border-gray-200 font-bold bg-gray-50 col-span-2">消費税</div>
                <div class="px-1 col-span-2">
                    <input type="number" class="w-full text-center p-1 border-0 focus:outline-none h-full" x-model.number="manualTax">
                </div>
            </div>
            <!-- 6. 税抜計 -->
            <div class="grid grid-cols-10 text-center text-sm bg-gray-50">
                <div class="col-span-2 px-2 border-r border-gray-200"></div>
                <div class="col-span-4 px-2 border-r border-gray-200"></div>
                <div class="px-2 border-r border-gray-200 font-bold col-span-2">税抜計</div>
                <div class="px-2 col-span-2" x-text="getManualTaxExcl().toLocaleString()"></div>
            </div>
        </div>
    </div>
</body>
</html>
